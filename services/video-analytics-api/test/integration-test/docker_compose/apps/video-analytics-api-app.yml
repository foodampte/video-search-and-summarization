# Video Analytics API app service for integration tests.
# Depends on infra stack (Elasticsearch).

services:
  video-analytics-api:
    image: video-analytics-api:integration-test
    network_mode: "host"
    volumes:
      - $INTEGRATION_TEST_DIR/docker_compose/apps/video-analytics-api-integration-config.json:/resources/config.json:ro
      - video-analytics-api-app:/web-api-app/files
    container_name: video-analytics-api-integration
    command: ["node", "index.js", "--config", "/resources/config.json"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: always

volumes:
  video-analytics-api-app:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: $DATA_DIR/data_log/video-analytics-api-app/files
