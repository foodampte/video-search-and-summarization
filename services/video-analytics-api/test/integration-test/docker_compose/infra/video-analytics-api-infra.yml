# Infra services for video-analytics-api integration tests (Elasticsearch only).
# Environment variables are set by generate_env.sh and sourced from .env.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    network_mode: "host"
    environment:
      ES_JAVA_OPTS: "-Xmx1024m -Xms256m"
      discovery.type: single-node
    volumes:
      - $INTEGRATION_TEST_DIR/docker_compose/infra/elk/configs/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    tmpfs:
      - /tmp/elastic/data
      - /tmp/elastic/logs
    container_name: web-api-elastic
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s
